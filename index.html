<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مسابقة الثقافة الرياضية المدرسية</title>
    <meta name="description" content="مسابقة الثقافة الرياضية المدرسية على مستوى المملكة - الاتحاد السعودي للثقافة الرياضية">

    <!-- Favicon -->
    <link rel="icon" type="image/jpeg" href="LOGO-01.jpg">
    <link rel="apple-touch-icon" href="LOGO-01.jpg">

    <!-- Open Graph / WhatsApp Sharing -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="مسابقة الثقافة الرياضية المدرسية">
    <meta property="og:description" content="مسابقة الثقافة الرياضية المدرسية على مستوى المملكة - الاتحاد السعودي للثقافة الرياضية">
    <meta property="og:image" content="https://testweb.help/LOGO-01.jpg">
    <meta property="og:image:width" content="1024">
    <meta property="og:image:height" content="724">
    <meta property="og:url" content="https://testweb.help/">
    <meta property="og:site_name" content="SSCF - الاتحاد السعودي للثقافة الرياضية">

    <!-- Twitter Card (also used by some apps) -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="مسابقة الثقافة الرياضية المدرسية">
    <meta name="twitter:description" content="مسابقة الثقافة الرياضية المدرسية على مستوى المملكة">
    <meta name="twitter:image" content="https://testweb.help/LOGO-01.jpg">

    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <!-- Background -->
    <div class="bg-overlay"></div>

    <!-- Particles Container -->
    <div id="particles-container"></div>

    <!-- Header -->
    <header class="main-header">
        <div class="header-logos">
            <div class="logo-item">
                <img src="moe-logo.jpeg" alt="وزارة التعليم" class="header-logo">
            </div>
            <div class="header-title">
                <h1>مسابقة الثقافة الرياضية المدرسية</h1>
                <p>على مستوى المملكة</p>
            </div>
            <div class="logo-item">
                <img src="LOGO-01.jpg" alt="الاتحاد السعودي للثقافة الرياضية" class="header-logo">
            </div>
        </div>
    </header>

    <!-- Teams Score Board -->
    <section class="scoreboard">
        <div class="team team-1" id="team1-board">
            <div class="team-logo-wrapper" id="team1-logo-wrapper">
                <img src="" alt="" class="team-logo" id="team1-logo" style="display:none;">
                <div class="team-logo-fallback" id="team1-logo-fallback"><i class="fas fa-users"></i></div>
            </div>
            <div class="team-name" id="team1-name">الفريق الأول</div>
            <div class="team-score" id="team1-score">0</div>
            <div class="team-label">نقاط</div>
        </div>
        <div class="vs-badge">
            <span>VS</span>
        </div>
        <div class="team team-2" id="team2-board">
            <div class="team-logo-wrapper" id="team2-logo-wrapper">
                <img src="" alt="" class="team-logo" id="team2-logo" style="display:none;">
                <div class="team-logo-fallback" id="team2-logo-fallback"><i class="fas fa-users"></i></div>
            </div>
            <div class="team-name" id="team2-name">الفريق الثاني</div>
            <div class="team-score" id="team2-score">0</div>
            <div class="team-label">نقاط</div>
        </div>
    </section>

    <!-- Current Turn Indicator -->
    <div class="turn-indicator" id="turn-indicator">
        <i class="fas fa-hand-point-left"></i>
        <span id="turn-text">دور: الفريق الأول</span>
    </div>

    <!-- Numbers Grid -->
    <section class="numbers-section">
        <div class="numbers-grid" id="numbers-grid">
            <!-- Numbers will be generated by JS -->
        </div>
    </section>

    <!-- Question Modal -->
    <div class="modal-overlay" id="question-modal">
        <div class="modal-content question-modal-content">
            <div class="timer-container">
                <div class="timer-ring">
                    <svg viewBox="0 0 120 120">
                        <circle class="timer-bg" cx="60" cy="60" r="54"></circle>
                        <circle class="timer-progress" id="timer-progress" cx="60" cy="60" r="54"></circle>
                    </svg>
                    <div class="timer-text" id="timer-text">30</div>
                </div>
                <div class="timer-label">ثانية متبقية</div>
            </div>
            <div class="question-number-badge" id="question-number-badge">سؤال 1</div>
            <h2 class="question-text" id="question-text">نص السؤال هنا</h2>
            <div class="answers-container" id="answers-container">
                <!-- Answers will be generated by JS -->
            </div>
            <div class="question-result" id="question-result">
                <div class="result-icon"></div>
                <div class="result-text"></div>
            </div>
        </div>
    </div>

    <!-- Team Selection Modal (which team is answering) -->
    <div class="modal-overlay" id="team-select-modal">
        <div class="modal-content team-select-content">
            <h2><i class="fas fa-question-circle"></i> من يجيب على هذا السؤال؟</h2>
            <div class="team-select-buttons">
                <button class="team-select-btn team1-btn" onclick="selectAnsweringTeam(1)">
                    <div class="team-select-logo" id="team-select-logo1">
                        <img src="" alt="" class="team-select-logo-img" id="team-select-logo-img1" style="display:none;">
                        <i class="fas fa-users team-select-logo-fallback" id="team-select-fallback1"></i>
                    </div>
                    <span id="team-select-name1">الفريق الأول</span>
                </button>
                <button class="team-select-btn team2-btn" onclick="selectAnsweringTeam(2)">
                    <div class="team-select-logo" id="team-select-logo2">
                        <img src="" alt="" class="team-select-logo-img" id="team-select-logo-img2" style="display:none;">
                        <i class="fas fa-users team-select-logo-fallback" id="team-select-fallback2"></i>
                    </div>
                    <span id="team-select-name2">الفريق الثاني</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Winner Modal -->
    <div class="modal-overlay" id="winner-modal">
        <div class="modal-content winner-modal-content">
            <div class="winner-trophy">
                <i class="fas fa-trophy"></i>
            </div>
            <div class="winner-confetti" id="winner-confetti"></div>
            <h1 class="winner-title">🎉 مبروووك! 🎉</h1>
            <div class="winner-logo-container" id="winner-logo-container" style="display:none;">
                <img src="" alt="" class="winner-logo-img" id="winner-logo-img">
            </div>
            <h2 class="winner-team-name" id="winner-team-name">الفريق الفائز</h2>
            <div class="winner-score" id="winner-score">0 نقاط</div>
            <div class="winner-stars">
                <i class="fas fa-star"></i>
                <i class="fas fa-star"></i>
                <i class="fas fa-star"></i>
                <i class="fas fa-star"></i>
                <i class="fas fa-star"></i>
            </div>
            <p class="winner-message">الفائز بمسابقة الثقافة الرياضية المدرسية</p>
            <button class="btn-restart" onclick="restartCompetition()">
                <i class="fas fa-redo"></i> إعادة المسابقة
            </button>
        </div>
    </div>

    <!-- Admin Link -->
    <a href="admin.html" class="admin-link" title="لوحة التحكم">
        <i class="fas fa-cog"></i>
    </a>

    <!-- Canvas for confetti -->
    <canvas id="confetti-canvas"></canvas>

    <script src="script.js"></script>
</body>
</html>
